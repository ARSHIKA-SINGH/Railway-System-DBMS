<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Railway Management System{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f5f7fa;
        }

        .navbar {
            background: linear-gradient(90deg, #0d6efd, #0b5ed7);
        }

        .navbar-brand {
            font-size: 1.3rem;
            letter-spacing: 0.5px;
        }

        .nav-link {
            transition: 0.2s ease;
        }

        .nav-link:hover {
            color: #ffc107 !important;
        }

        .nav-link.active {
            font-weight: 500;
            border-bottom: 2px solid #ffc107;
        }

        main {
            min-height: 80vh;
        }

        .footer {
            background: #212529;
            color: #aaa;
            padding: 12px 0;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="{{ url_for('dashboard') }}">
            🚆 Railway System
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto gap-lg-3">

                <li class="nav-item">
                    <a class="nav-link {% if request.path in ['/', '/dashboard'] %}active{% endif %}"
                       href="{{ url_for('dashboard') }}">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/bookings' %}active{% endif %}"
                       href="{{ url_for('bookings') }}">Bookings</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/tickets' %}active{% endif %}"
                       href="{{ url_for('tickets') }}">Tickets</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/routes' %}active{% endif %}"
                       href="{{ url_for('routes') }}">Routes</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/analytics' %}active{% endif %}"
                       href="{{ url_for('analytics') }}">Analytics</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<main class="container py-4 py-lg-5">
    {% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<div class="footer">
    © 2026 Railway Management System • DBMS Project
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
